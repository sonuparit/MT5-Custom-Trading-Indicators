<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Event Cleaner</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
      }
      button {
        padding: 10px 15px;
        margin: 5px 5px 15px 0;
      }
      label {
        margin-right: 10px;
      }
      pre {
        background: #f4f4f4;
        padding: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h2>HTML Event Table Cleaner</h2>
    <p>Paste your raw HTML table below:</p>
    <textarea id="input"></textarea><br />

    <label
      >Start Time: <input type="time" id="startTime" value="17:56"
    /></label>
    <label>End Time: <input type="time" id="endTime" value="23:00" /></label
    ><br /><br />

    <button onclick="process()">Process</button>
    <button onclick="download()">Download .txt</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <script src="./Events.js"></script>
  </body>
</html>
