<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TR Block Remover</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      textarea {
        width: 100%;
        height: 200px;
        margin-bottom: 10px;
      }
      input {
        width: 300px;
        margin-bottom: 10px;
      }
      button {
        padding: 8px 12px;
        margin: 5px;
      }
      label {
        margin-right: 10px;
      }
      pre {
        background: #f4f4f4;
        padding: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h2>Remove &lt;tr&gt; Blocks by Keyword</h2>
    <p>Paste your HTML table below:</p>
    <textarea id="input"></textarea><br />

    <label>Keywords (comma separated):</label><br />
    <input
      type="text"
      id="keywords"
      placeholder="e.g. Holiday, Closed, Weekend"
    /><br />

    <label><input type="checkbox" id="caseSensitive" /> Case Sensitive</label
    ><br /><br />

    <button onclick="process()">Process</button>
    <button onclick="download()">Download Cleaned HTML</button>

    <h3>Output:</h3>
    <pre id="output"></pre>

    <h3>Summary:</h3>
    <pre id="summary"></pre>

    <script src="./Tr.js"></script>
  </body>
</html>
